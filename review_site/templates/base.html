<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NPI Review{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6 text-sm">
    <a href="/" class="font-semibold text-blue-700 text-base">NPI Review</a>
    <a href="/centers" class="hover:text-blue-600 {% if request.path.startswith('/centers') %}text-blue-600 font-medium{% endif %}">Medical Centers</a>
    <a href="/professionals" class="hover:text-blue-600 {% if request.path.startswith('/professionals') %}text-blue-600 font-medium{% endif %}">Professionals</a>
    <a href="/decisions" class="hover:text-blue-600 {% if request.path.startswith('/decisions') %}text-blue-600 font-medium{% endif %}">Decisions</a>
    <div class="ml-auto flex gap-3">
      <a href="/export" class="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700 text-xs font-medium">Export Confirmed CSV</a>
      <a href="/reload" class="text-gray-500 hover:text-gray-700 px-3 py-1.5 rounded border border-gray-300 text-xs">Reload Data</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
